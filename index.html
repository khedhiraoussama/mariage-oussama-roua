<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Oussama & Roua</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f8f6f2;
    color:#0F2747;
    text-align:center;
}

.hero{
    padding:50px 20px;
}

h1{
    font-size:3em;
    margin-bottom:10px;
}

.countdown{
    font-size:1.5em;
    margin:20px;
    font-weight:bold;
}

.section{
    padding:30px 20px;
}

.btn{
    background:#0F2747;
    color:white;
    padding:15px 25px;
    border-radius:10px;
    text-decoration:none;
    display:inline-block;
}

img{
    width:90%;
    max-width:700px;
    border-radius:15px;
    margin:15px auto;
}
</style>
</head>

<body>

<div class="hero">

<h1>Oussama & Roua</h1>

<p>
C'est avec beaucoup d'amour et de bonheur que nous vous invitons à partager le plus beau jour de notre vie.
</p>

<h3>02 Août 2026 • 21h00</h3>

<div class="countdown" id="countdown"></div>

</div>

<div class="section">

<h2>Arcadia Wedding</h2>

<a class="btn"
href="https://maps.app.goo.gl/tywXgSKoDuLP1YqXA?g_st=ac">
Voir l'itinéraire
</a>


<div class="section">

<h2>Notre Vidéo</h2>

<video width="90%" controls playsinline>
    <source src="Video.mp4" type="video/mp4">
    Votre navigateur ne supporte pas la vidéo.
</video>

</div>
<script>

const weddingDate = new Date("August 2, 2026 21:00:00").getTime();

setInterval(function(){

const now = new Date().getTime();

const distance = weddingDate - now;

const days = Math.floor(distance/(1000*60*60*24));
const hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const minutes = Math.floor((distance%(1000*60*60))/(1000*60));
const seconds = Math.floor((distance%(1000*60))/1000);

document.getElementById("countdown").innerHTML =
days+" jours "
+hours+" h "
+minutes+" min "
+seconds+" sec";

},1000);

</script>

</body>
</html>
