<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Oussama & Roua</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f8f6f2;
    color:#0F2747;
    text-align:center;
}

.cover{
    height:100vh;
    background:url('DSC01004-2.jpg') center center/cover no-repeat;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    align-items:center;
    color:#F3E5AB;
    text-shadow:4px 4px 18px rgba(0,0,0,0.95);
    padding-bottom:100px;
    box-sizing:border-box;
}

.cover h1{
    font-size:2.8em;
    line-height:1.1;
    margin:0;
    font-weight:bold;
    color:#F3E5AB;
}

.cover p{
    font-size:1.35em;
    color:#F3E5AB;
    margin-top:35px;
    letter-spacing:4px;
    font-weight:700;
}

.hero{
    padding:50px 20px;
}

.countdown{
    font-size:1.8em;
    margin:20px;
    font-weight:bold;
}

.section{
    padding:30px 20px;
}

.btn{
    background:#0F2747;
    color:white;
    padding:15px 25px;
    border-radius:10px;
    text-decoration:none;
    display:inline-block;
}

img{
    width:90%;
    max-width:700px;
    border-radius:15px;
    margin:15px auto;
    display:block;
}

video{
    width:90%;
    max-width:700px;
    border-radius:15px;
}

</style>

</head>

<body>

<div class="cover">

<h1>
Oussama
<br>
<span style="font-size:0.7em;">&</span>
<br>
Roua
</h1>

<p>02 AOÛT 2026 ✦ 21H00</p>

</div>

<div class="hero">

<p id="guest"></p>

<p>
C'est avec beaucoup d'amour et de bonheur que nous vous invitons à partager le plus beau jour de notre vie.
</p>

<div class="countdown" id="countdown"></div>

</div>

<div class="section">

<h2>Arcadia Wedding</h2>

<a class="btn"
href="https://maps.app.goo.gl/tywXgSKoDuLP1YqXA?g_st=ac"
target="_blank">
Voir l'itinéraire
</a>

</div>

<div class="section">

<h2>Notre Vidéo</h2>

<video autoplay muted playsinline loop>
<source src="Video.mp4" type="video/mp4">
</video>

</div>

<div class="section">

<h2>Nos Photos</h2>

<img src="DSC01004-2.jpg" alt="Oussama et Roua">

<img src="DSC01034.jpg" alt="Oussama et Roua">

<img src="image00017.jpeg" alt="Oussama et Roua">

<img src="9A8056DE-D91F-40A0-896E-32DC574C2291.jpeg" alt="Oussama et Roua">

</div>

<script>

const params = new URLSearchParams(window.location.search);
const invite = params.get("invite");

if(invite){
document.getElementById("guest").innerHTML =
"<strong>Cher(e) " + invite + ",</strong>";
}

const weddingDate = new Date("August 2, 2026 21:00:00").getTime();

setInterval(function(){

const now = new Date().getTime();

const distance = weddingDate - now;

const days = Math.floor(distance/(1000*60*60*24));
const hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const minutes = Math.floor((distance%(1000*60*60))/(1000*60));
const seconds = Math.floor((distance%(1000*60))/1000);

document.getElementById("countdown").innerHTML =
days + " jours "
+ hours + " h "
+ minutes + " min "
+ seconds + " sec";

},1000);

</script>

</body>
</html>
